<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Churn Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Inter',sans-serif;
    background:#0f172a;
    color:#e2e8f0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.wrapper{
    width:950px;
    background:#111827;
    border-radius:20px;
    display:flex;
    overflow:hidden;
    box-shadow:0 25px 60px rgba(0,0,0,0.6);
}

.left{
    flex:1;
    padding:60px;
    background:linear-gradient(135deg,#2563eb,#1e40af);
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left h1{
    font-size:32px;
    margin-bottom:15px;
}

.left p{
    opacity:0.9;
    line-height:1.6;
}

.right{
    flex:1;
    padding:50px;
}

.input-group{
    margin-bottom:20px;
}

label{
    font-size:14px;
    opacity:0.8;
}

input{
    width:100%;
    padding:14px;
    margin-top:6px;
    border-radius:10px;
    border:1px solid #374151;
    background:#1f2937;
    color:white;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#2563eb;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
}

.result{
    margin-top:25px;
    padding:20px;
    border-radius:12px;
    background:#1f2937;
    display:none;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="left">
    <h1>Customer Churn Intelligence</h1>
    <p>
        Predict customer churn risk using AI-driven analytics.
        Enter customer details and receive real-time probability scoring.
    </p>
</div>

<div class="right">

    <div class="input-group">
        <label>Tenure (Months)</label>
        <input type="number" id="tenure">
    </div>

    <div class="input-group">
        <label>Monthly Charges</label>
        <input type="number" id="monthly_charges">
    </div>

    <div class="input-group">
        <label>Contract Type (0 / 1 / 2)</label>
        <input type="number" id="contract_type">
    </div>

    <button onclick="predict()">Analyze Risk</button>

    <div class="result" id="result"></div>

</div>
</div>

<script>
async function predict(){

    const data = {
        tenure:parseInt(document.getElementById("tenure").value),
        monthly_charges:parseFloat(document.getElementById("monthly_charges").value),
        contract_type:parseInt(document.getElementById("contract_type").value)
    };

    const resultBox=document.getElementById("result");

    try{
        const response=await fetch("http://127.0.0.1:8000/predict",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(data)
        });

        const result=await response.json();

        resultBox.style.display="block";

        resultBox.innerHTML=`
            <h3>${result.prediction}</h3>
            <p style="margin-top:8px;">
            Churn Probability: ${(result.churn_probability*100).toFixed(2)}%
            </p>
        `;

    }catch(error){
        resultBox.style.display="block";
        resultBox.innerHTML="Backend not running!";
    }
}
</script>

</body>
</html>
